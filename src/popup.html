<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>YT Studio Karten – Einstellungen</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; width: 280px; margin: 0; padding: 14px 16px 16px; background: #1c1c1e; color: #f1f1f1; }
  h1 { font-size: 14px; margin: 0 0 12px; }
  fieldset { border: 1px solid #3d3d40; border-radius: 10px; margin: 0 0 10px; padding: 6px 10px 10px; }
  legend { font-size: 10.5px; text-transform: uppercase; letter-spacing: .4px; opacity: .65; padding: 0 4px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 7px 0 0; font-size: 12.5px; }
  input[type=number] { width: 60px; background: #111; color: #eee; border: 1px solid #555; border-radius: 6px; padding: 4px 6px; }
  select { background: #111; color: #eee; border: 1px solid #555; border-radius: 6px; padding: 4px 6px; }
  input[type=checkbox] { accent-color: #ff3b3b; width: 15px; height: 15px; }
  button { cursor: pointer; border: 1px solid #666; background: #2a2a2c; color: #eee; border-radius: 8px; padding: 6px 12px; font-size: 12.5px; }
  button:hover { background: #333; }
  button.primary { background: #ff3b3b; border-color: #ff3b3b; color: #fff; }
  button.primary:hover { background: #e33333; }
  .actions { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  #status { font-size: 11.5px; opacity: .85; color: #3ddc84; }
</style>
</head>
<body>
<h1>YT Studio Karten</h1>

<fieldset>
  <legend>CTR-Ampel (%)</legend>
  <div class="row"><label for="ctrGood">Grün ab</label><input type="number" id="ctrGood" step="0.1" min="0"></div>
  <div class="row"><label for="ctrOk">Gelb ab</label><input type="number" id="ctrOk" step="0.1" min="0"></div>
</fieldset>

<fieldset>
  <legend>Retention-Ampel (%)</legend>
  <div class="row"><label for="retGood">Grün ab</label><input type="number" id="retGood" step="1" min="0"></div>
  <div class="row"><label for="retOk">Gelb ab</label><input type="number" id="retOk" step="1" min="0"></div>
</fieldset>

<fieldset>
  <legend>Darstellung</legend>
  <div class="row"><label for="cardMin">Kartengröße</label>
    <select id="cardMin">
      <option value="260">Klein</option>
      <option value="300">Mittel</option>
      <option value="360">Groß</option>
    </select>
  </div>
  <div class="row"><label for="showPanel">Panel auf Analytics-Seiten</label><input type="checkbox" id="showPanel"></div>
  <div class="row"><label for="squareMode" title="Entfernt alle abgerundeten Ecken auf YouTube und in Studio">Alles eckig (YouTube + Studio)</label><input type="checkbox" id="squareMode"></div>
</fieldset>

<div class="actions">
  <button class="primary" id="save">Speichern</button>
  <button id="clearCache" title="Gespeicherte CTR/Retention-Werte verwerfen">Cache leeren</button>
  <span id="status"></span>
</div>

<script src="popup.js"></script>
</body>
</html>
