    <rect x="28" y="74" width="15" height="26" rx="5"/>
    <rect x="56" y="60" width="15" height="40" rx="5"/>
    <rect x="84" y="46" width="15" height="54" rx="5"/>
  </g>

  <!-- geglättete Trend-Linie -->
